apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # After external-secrets Helm chart installs
spec:
  project: default
  source:
    repoURL: https://github.com/el-dragon-1/homelab_dklair.git
    targetRevision: HEAD
    path: apps/external-secrets-config
  destination:
    server: https://kubernetes.default.svc
    namespace: secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true