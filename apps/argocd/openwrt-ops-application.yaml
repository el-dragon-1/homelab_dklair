apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openwrt-ops
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/el-dragon-1/homelab_dklair.git
    targetRevision: HEAD
    path: apps/openwrt-ops
  destination:
    server: https://kubernetes.default.svc
    namespace: openwrt-ops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
