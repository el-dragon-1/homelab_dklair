apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: redis
    server: https://kubernetes.default.svc
  sources:
    # ✅ Bitnami redis-cluster chart (NOT "redis")
    - repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 13.0.4  # ✅ Valid redis-cluster version [[5]]
      chart: redis-cluster
      helm:
        valueFiles:
          - $values/values/redis-cluster/values.yaml
    - repoURL: https://github.com/el-dragon-1/homelab_dklair.git
      targetRevision: HEAD
      ref: values
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true