apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: redis
    server: https://kubernetes.default.svc
  sources:
    # 1️⃣ Bitnami Redis Cluster Helm Chart
    - repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 25.3.11  # 🔁 Check for latest: https://artifacthub.io/packages/helm/bitnami/redis-cluster
      chart: redis-cluster
      helm:
        valueFiles:
          - $values/values/redis-cluster/values.yaml
    # 2️⃣ Your values file from Git
    - repoURL: https://github.com/el-dragon-1/homelab_dklair.git
      targetRevision: HEAD
      ref: values
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true