apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: searxng
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  ignoreDifferences:
    - kind: Secret
      name: searxng-runtime
      namespace: searxng
      jsonPointers:
        - /data/SEARXNG_SECRET
  sources:
    - repoURL: https://techpipe-io.github.io/searxng-helm-chart/
      chart: searxng
      targetRevision: 0.1.6
      helm:
        valueFiles:
          - $values/values/searxng/values.yaml
    - repoURL: https://github.com/el-dragon-1/homelab_dklair.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: searxng
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
