# Alertmanager receivers configured for Telegram notifications from Vault secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-receivers
  namespace: monitoring
  labels:
    app.kubernetes.io/component: secret
    app.kubernetes.io/instance: prometheus-stack
    app.kubernetes.io/name: alertmanager-receivers
    app.kubernetes.io/part-of: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-receivers
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/component: secret
          app.kubernetes.io/instance: prometheus-stack
          app.kubernetes.io/name: alertmanager-receivers
          app.kubernetes.io/part-of: monitoring
      data:
        telegram-bot-token: "{{ .telegram_bot_token }}"
        telegram-chat-id: "{{ .telegram_chat_id }}"
  data:
    - secretKey: telegram_bot_token
      remoteRef:
        key: homelab/monitoring/alertmanager
        property: telegram_bot_token
    - secretKey: telegram_chat_id
      remoteRef:
        key: homelab/monitoring/alertmanager
        property: telegram_chat_id
