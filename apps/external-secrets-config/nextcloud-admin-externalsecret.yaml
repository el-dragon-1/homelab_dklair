# Nextcloud admin credentials are sourced from Vault so the chart values stay secret-free.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nextcloud-admin
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: nextcloud-admin
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: homelab/nextcloud/nextcloud-admin
        property: username
    - secretKey: password
      remoteRef:
        key: homelab/nextcloud/nextcloud-admin
        property: password