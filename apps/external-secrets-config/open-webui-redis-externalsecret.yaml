apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: open-webui-redis
  namespace: open-webui
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: open-webui-redis
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        redis-url: "redis://:{{ .password }}@redis-cluster.redis.svc.cluster.local:6379/0"
  data:
    - secretKey: password
      remoteRef:
        key: homelab/redis/redis-auth
        property: password
