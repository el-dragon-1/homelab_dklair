apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: open-webui-search
  namespace: open-webui
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: open-webui-search
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        brave_search_api_key: "{{ .brave_search_api_key }}"
  data:
    - secretKey: brave_search_api_key
      remoteRef:
        key: homelab/open-webui/brave-search
        property: brave_search_api_key
