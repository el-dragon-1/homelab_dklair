# Pi-hole admin password is sourced from Vault so the Helm values stay free of secrets.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pihole-admin
  namespace: pihole
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: pihole-admin
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: homelab/pihole/pihole-admin
        property: password