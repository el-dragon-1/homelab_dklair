apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-admin
  namespace: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgresql-admin
    creationPolicy: Owner
    template:
      type: Opaque
      data:                        # ← Added: template data mappings
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:                            # ← Added: remote reference mappings
    - secretKey: username
      remoteRef:
        key: homelab/postgresql/postgresql-admin
        property: username
    - secretKey: password
      remoteRef:
        key: homelab/postgresql/postgresql-admin
        property: password