apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: wireguard-config
  namespace: wireguard
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: wireguard-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        wg0.conf: "{{ .wg0_config | default .wg0_conf }}"
  dataFrom:
    - extract:
        key: homelab/wireguard/wireguard-config
