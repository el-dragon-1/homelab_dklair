apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-admin
  namespace: postgresql  # Target namespace where the Kubernetes Secret will be created
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend          # Matches your ClusterSecretStore name
    kind: ClusterSecretStore     # Important: this is cluster-scoped
  target:
    name: postgresql-admin       # Name of the Kubernetes Secret to create
    creationPolicy: Owner        # ESO manages the full lifecycle
    template:
      type: Opaque
      metadata:
        labels:
          app: postgresql
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: postgresql/postgresql-admin   # Vault path *relative* to store's base path "homelab"
        property: username             # Field inside the KV v2 secret
    - secretKey: password
      remoteRef:
        key: postgresql/postgresql-admin
        property: password