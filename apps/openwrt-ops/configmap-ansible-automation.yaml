apiVersion: v1
kind: ConfigMap
metadata:
  name: openwrt-ansible-automation
  namespace: openwrt-ops
data:
  ansible.cfg: |
    [defaults]
    host_key_checking = False
    interpreter_python = auto_silent
    timeout = 20
    retry_files_enabled = False

    [ssh_connection]
    pipelining = True
    ssh_args = -o StrictHostKeyChecking=accept-new
  openwrt-playbook.yml: |
    ---
    - name: OpenWRT reconcile
      hosts: all
      gather_facts: false
      tasks:
        - name: Read OpenWRT release information
          ansible.builtin.raw: cat /etc/openwrt_release
          register: openwrt_release
          changed_when: false

        - name: Show target version
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} release: {{ openwrt_release.stdout_lines | default([]) }}"

        - name: Validate UCI is available
          ansible.builtin.raw: command -v uci
          changed_when: false

        - name: Capture running UCI config snapshot
          ansible.builtin.raw: uci export
          register: uci_export
          changed_when: false

        - name: Print reconciliation mode
          ansible.builtin.debug:
            msg: "Running {{ openwrt_mode }} mode for {{ inventory_hostname }}"

        - name: Apply desired hostname in enforce mode
          ansible.builtin.raw: |
            uci set system.@system[0].hostname='{{ desired_hostname }}'
            uci commit system
          when: openwrt_mode == "enforce"

        - name: Render gateway wireless config (enforce mode)
          ansible.builtin.raw: |
            cat >/tmp/wireless.uci <<'EOF'
            package wireless

            config wifi-device 'radio0'
              option type 'mac80211'
              option path 'platform/soc/18000000.wifi'
              option band '2g'
              option channel '6'
              option htmode 'HE20'
              option cell_density '0'
              option beacon_int '100'

            config wifi-device 'radio1'
              option type 'mac80211'
              option path 'platform/soc/18000000.wifi+1'
              option band '5g'
              option channel '36'
              option htmode 'HE80'
              option cell_density '0'

            config wifi-iface 'default_radio1'
              option device 'radio1'
              option network 'lan'
              option mode 'mesh'
              option encryption 'sae'
              option key '{{ mesh_key }}'
              option mesh_id 'smz5mesh'
              option mesh_fwding '1'
              option mesh_rssi_threshold '0'

            config wifi-iface 'wifinet2'
              option device 'radio0'
              option mode 'ap'
              option ssid 'OpenWrt'
              option encryption 'psk2+ccmp'
              option network 'iot'
              option key '{{ openwrt_ssid_key }}'
              option dtim_period '1'

            config wifi-iface 'wifinet3'
              option device 'radio0'
              option mode 'ap'
              option ssid 'smz_guest'
              option encryption 'sae-mixed'
              option key '{{ smz_guest_ssid_key }}'
              option network 'smz_guest'
              option isolate '1'
              option dtim_period '1'
            EOF
          when:
            - openwrt_mode == "enforce"
            - inventory_hostname == "gateway"

        - name: Render AP wireless config (enforce mode)
          ansible.builtin.raw: |
            cat >/tmp/wireless.uci <<'EOF'
            package wireless

            config wifi-device 'radio0'
              option type 'mac80211'
              option path 'platform/soc/18000000.wifi'
              option band '2g'
              option channel '1'
              option htmode 'HE20'
              option cell_density '0'
              option beacon_int '100'
              option txpower '20'

            config wifi-device 'radio1'
              option type 'mac80211'
              option path 'platform/soc/18000000.wifi+1'
              option band '5g'
              option channel '36'
              option htmode 'HE80'
              option cell_density '0'

            config wifi-iface 'wifinet3'
              option device 'radio1'
              option mode 'mesh'
              option encryption 'sae'
              option mesh_id 'smz5mesh'
              option mesh_fwding '1'
              option mesh_rssi_threshold '0'
              option network 'lan'
              option key '{{ mesh_key }}'

            config wifi-iface 'wifinet1'
              option device 'radio0'
              option mode 'ap'
              option ssid 'smz_homex'
              option encryption 'sae-mixed'
              option key '{{ smx_homex_ssid_key }}'
              option ocv '0'
              option network 'lan'
            EOF
          when:
            - openwrt_mode == "enforce"
            - inventory_hostname == "ap"

        - name: Import wireless config (enforce mode)
          ansible.builtin.raw: uci import wireless < /tmp/wireless.uci && uci commit wireless
          when: openwrt_mode == "enforce"

        - name: Confirm hostname after enforcement
          ansible.builtin.raw: uci get system.@system[0].hostname
          register: current_hostname
          changed_when: false

        - name: Show current hostname
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} hostname: {{ current_hostname.stdout | trim }}"
