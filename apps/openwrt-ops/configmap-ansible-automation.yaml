apiVersion: v1
kind: ConfigMap
metadata:
  name: openwrt-ansible-automation
  namespace: openwrt-ops
data:
  ansible.cfg: |
    [defaults]
    host_key_checking = False
    interpreter_python = auto_silent
    timeout = 20
    retry_files_enabled = False

    [ssh_connection]
    pipelining = True
    ssh_args = -o StrictHostKeyChecking=accept-new
  openwrt-playbook.yml: |
    ---
    - name: OpenWRT reconcile
      hosts: all
      gather_facts: false
      tasks:
        - name: Read OpenWRT release information
          ansible.builtin.raw: cat /etc/openwrt_release
          register: openwrt_release
          changed_when: false

        - name: Show target version
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} release: {{ openwrt_release.stdout_lines | default([]) }}"

        - name: Validate UCI is available
          ansible.builtin.raw: command -v uci
          changed_when: false

        - name: Capture running UCI config snapshot
          ansible.builtin.raw: uci export
          register: uci_export
          changed_when: false

        - name: Print reconciliation mode
          ansible.builtin.debug:
            msg: "Running {{ openwrt_mode }} mode for {{ inventory_hostname }}"

        - name: Define declarative UCI package list
          ansible.builtin.set_fact:
            desired_uci_packages:
              - system
              - network
              - dhcp
              - firewall
              - wireless
          when: openwrt_mode == "enforce"

        - name: Verify desired package files exist
          ansible.builtin.stat:
            path: "/work/repo/openwrt/desired/{{ inventory_hostname }}/{{ item }}.uci"
          delegate_to: localhost
          loop: "{{ desired_uci_packages }}"
          register: desired_uci_stats
          when: openwrt_mode == "enforce"

        - name: Fail if declarative desired files are missing
          ansible.builtin.fail:
            msg: >-
              Missing required desired files for {{ inventory_hostname }}: {{ desired_uci_stats.results
              | rejectattr('stat.exists')
              | map(attribute='item')
              | map('regex_replace', '^(.*)$', '\\1.uci')
              | join(', ') }}
          when:
            - openwrt_mode == "enforce"
            - desired_uci_stats is defined
            - (desired_uci_stats.results | rejectattr('stat.exists') | list | length) > 0

        - name: Stage desired package configs from repo
          ansible.builtin.raw: |
            cat >/tmp/{{ item }}.uci <<'EOF'
            {{ lookup('ansible.builtin.template', '/work/repo/openwrt/desired/' ~ inventory_hostname ~ '/' ~ item ~ '.uci') | trim }}
            EOF
          loop: "{{ desired_uci_packages }}"
          when: openwrt_mode == "enforce"

        - name: Check if wpad-mesh-wolfssl is installed on Orchid
          ansible.builtin.raw: apk list --installed 2>/dev/null | grep -q wpad-mesh && echo "installed" || echo "missing"
          register: wpad_installed
          changed_when: false
          when:
            - openwrt_mode == "enforce"
            - inventory_hostname == "orchid"

        - name: Download wpad-mesh-wolfssl on controller and push to Orchid via SCP
          delegate_to: localhost
          ansible.builtin.shell: |
            set -e
            PKGS_URL="https://downloads.openwrt.org/releases/25.12.4/packages/aarch64_cortex-a53/base"
            PKG=$(wget -qO- "${PKGS_URL}/" | grep -oE 'wpad-mesh-wolfssl[^"<> ]+\.apk' | head -1)
            [ -n "$PKG" ] || { echo "ERROR: wpad-mesh-wolfssl not found in package index"; exit 1; }
            wget -q -O /tmp/wpad-mesh-wolfssl.apk "${PKGS_URL}/${PKG}"
            scp -O -i /work/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -P {{ ansible_port }} \
              /tmp/wpad-mesh-wolfssl.apk \
              {{ ansible_user }}@{{ ansible_host }}:/tmp/wpad-mesh-wolfssl.apk
          when:
            - openwrt_mode == "enforce"
            - inventory_hostname == "orchid"
            - wpad_installed.stdout is defined
            - '"missing" in wpad_installed.stdout'

        - name: Install wpad-mesh-wolfssl on Orchid from local package
          ansible.builtin.raw: |
            sed -i '/^wpad-basic$/d;/^wpad-basic-wolfssl$/d;/^wpad-basic-openssl$/d;/^wpad-basic-mbedtls$/d' /etc/apk/world || true
            apk del wpad-basic-wolfssl wpad-basic wpad-basic-openssl wpad-basic-mbedtls 2>/dev/null || true
            apk add --allow-untrusted /tmp/wpad-mesh-wolfssl.apk
          when:
            - openwrt_mode == "enforce"
            - inventory_hostname == "orchid"
            - wpad_installed.stdout is defined
            - '"missing" in wpad_installed.stdout'

        - name: Import desired package configs (enforce mode)
          ansible.builtin.raw: uci import {{ item }} < /tmp/{{ item }}.uci && uci commit {{ item }}
          loop: "{{ desired_uci_packages }}"
          when: openwrt_mode == "enforce"

        - name: Apply network interfaces without full network restart
          ansible.builtin.raw: |
            ifup lan || true
            ifup wan || true
            ifup wan6 || true
            ifup iot || true
            ifup smz_guest || true
          when: openwrt_mode == "enforce"

        - name: Reload firewall service after desired import
          ansible.builtin.raw: /etc/init.d/firewall restart || /etc/init.d/firewall reload || true
          when: openwrt_mode == "enforce"

        - name: Reload DHCP services after desired import
          ansible.builtin.raw: |
            /etc/init.d/dnsmasq restart || /etc/init.d/dnsmasq reload || true
            /etc/init.d/odhcpd restart || /etc/init.d/odhcpd reload || true
          when: openwrt_mode == "enforce"

        - name: Reload wireless service after desired import
          ansible.builtin.raw: wifi reload || (wifi down; wifi up)
          when: openwrt_mode == "enforce"

        - name: Confirm hostname after enforcement
          ansible.builtin.raw: uci get system.@system[0].hostname
          register: current_hostname
          changed_when: false

        - name: Show current hostname
          ansible.builtin.debug:
            msg: "{{ inventory_hostname }} hostname: {{ current_hostname.stdout | trim }}"
