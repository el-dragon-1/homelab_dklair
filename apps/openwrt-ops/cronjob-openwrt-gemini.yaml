apiVersion: batch/v1
kind: CronJob
metadata:
  name: openwrt-gemini-reconcile
  namespace: openwrt-ops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedule: "21,51 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: ansible
              image: python:3.12-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: DEVICE_NAME
                  value: gemini
                - name: DESIRED_HOSTNAME
                  value: OpenWrt-Gemini
                - name: OPENWRT_MODE
                  value: enforce
                - name: OPENWRT_HOST
                  valueFrom:
                    secretKeyRef:
                      name: openwrt-gemini-auth
                      key: host
                - name: OPENWRT_PORT
                  valueFrom:
                    secretKeyRef:
                      name: openwrt-gemini-auth
                      key: port
                - name: OPENWRT_USER
                  valueFrom:
                    secretKeyRef:
                      name: openwrt-gemini-auth
                      key: username
                - name: SSH_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: openwrt-gemini-auth
                      key: ssh_private_key
                - name: OPENWRT_SSID_KEY
                  valueFrom:
                    secretKeyRef:
                      name: openwrt-gemini-auth
                      key: openwrt_ssid_key
                - name: SMZ_HOMEX_SSID_KEY
                  valueFrom:
                    secretKeyRef:
                      name: openwrt-gemini-auth
                      key: smz_homex_ssid_key
                - name: SMZ_GUEST_SSID_KEY
                  valueFrom:
                    secretKeyRef:
                      name: openwrt-gemini-auth
                      key: smz_guest_ssid_key
              command:
                - /bin/sh
                - -ec
                - |
                  apk add --no-cache openssh-client
                  pip install --no-cache-dir ansible-core==2.17.3
                  mkdir -p /work/.ssh
                  # Accept private keys from Vault as raw multiline, escaped \n, or base64 text.
                  KEY="$SSH_PRIVATE_KEY"
                  KEY="${KEY#\"}"
                  KEY="${KEY%\"}"
                  if printf "%s" "$KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
                    printf "%b" "$KEY" | tr -d '\r' > /work/.ssh/id_ed25519
                  else
                    printf "%s" "$KEY" | tr -d '\r\n' | base64 -d > /work/.ssh/id_ed25519
                  fi
                  chmod 600 /work/.ssh/id_ed25519
                  python - <<'PY'
                  import json
                  import os

                  host = os.environ["DEVICE_NAME"]
                  inventory = {
                    "all": {
                      "hosts": {
                        host: {
                          "ansible_host": os.environ["OPENWRT_HOST"],
                          "ansible_port": int(os.environ["OPENWRT_PORT"]),
                          "ansible_user": os.environ["OPENWRT_USER"],
                          "ansible_connection": "ssh",
                          "ansible_private_key_file": "/work/.ssh/id_ed25519",
                          "desired_hostname": os.environ["DESIRED_HOSTNAME"],
                          "openwrt_mode": os.environ["OPENWRT_MODE"],
                          "openwrt_ssid_key": os.environ["OPENWRT_SSID_KEY"],
                          "smz_homex_ssid_key": os.environ["SMZ_HOMEX_SSID_KEY"],
                          "smz_guest_ssid_key": os.environ["SMZ_GUEST_SSID_KEY"],
                        }
                      }
                    }
                  }

                  with open("/work/inventory.json", "w", encoding="utf-8") as f:
                    json.dump(inventory, f)
                  PY
                  ANSIBLE_CONFIG=/automation/ansible.cfg ansible-playbook -i /work/inventory.json /automation/openwrt-playbook.yml --limit "${DEVICE_NAME}"
              volumeMounts:
                - name: automation
                  mountPath: /automation
          volumes:
            - name: automation
              configMap:
                name: openwrt-ansible-automation
