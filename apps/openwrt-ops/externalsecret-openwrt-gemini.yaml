apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openwrt-gemini-auth
  namespace: openwrt-ops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: openwrt-gemini-auth
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: host
      remoteRef:
        key: homelab/openwrt/gemini
        property: host
    - secretKey: port
      remoteRef:
        key: homelab/openwrt/gemini
        property: port
    - secretKey: username
      remoteRef:
        key: homelab/openwrt/gemini
        property: username
    - secretKey: ssh_private_key
      remoteRef:
        key: homelab/openwrt/gemini
        property: ssh_private_key
    - secretKey: openwrt_ssid_key
      remoteRef:
        key: homelab/openwrt/gemini
        property: openwrt_ssid_key
    - secretKey: smz_homex_ssid_key
      remoteRef:
        key: homelab/openwrt/gemini
        property: smz_homex_ssid_key
    - secretKey: smz_guest_ssid_key
      remoteRef:
        key: homelab/openwrt/gemini
        property: smz_guest_ssid_key
