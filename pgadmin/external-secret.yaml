apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pgadmin-admin
  namespace: pgadmin
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: pgadmin-admin
    creationPolicy: Owner
  data:
    - secretKey: email
      remoteRef:
        key: pgadmin/pgadmin-admin
        property: email
    - secretKey: password
      remoteRef:
        key: pgadmin/pgadmin-admin
        property: password