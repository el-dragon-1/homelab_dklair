apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/compare-options: IgnoreExtraneous  # Optional: reduce noise
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: redis-operator
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://ot-container-kit.github.io/helm-charts/
      targetRevision: 0.11.0
      chart: redis-operator
      helm:
        valueFiles:
          - $values/values/redis-operator/values.yaml
        parameters:
          - name: installCRDs
            value: "true"
          - name: image.tag  # ← Optional: override image tag via parameter
            value: "v1.2.0"
    - repoURL: https://github.com/el-dragon-1/homelab_dklair.git
      targetRevision: HEAD
      ref: values
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true  # Optional: smoother syncs