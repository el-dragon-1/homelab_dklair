replicaCount: 1

configuration:
  enabled: true

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet
hostPort:
  enabled: true
  port: 8123

persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 10Gi
  storageClass: longhorn

ingress:
  enabled: true
  className: my-traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts:
    - host: homeassistant.dklair.io
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: homeassistant-tls
      hosts:
        - homeassistant.dklair.io

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi