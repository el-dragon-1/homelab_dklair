# LocalAI values
# - Exposed through Traefik at localai.dklair.io
# - Uses Longhorn-backed persistence for model and output storage

replicaCount: 0

deployment:
  image:
    repository: quay.io/go-skynet/local-ai
    tag: latest-gpu-nvidia-cuda-12
  env:
    threads: 4
    context_size: 2048
  runtimeClassName: nvidia
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: my-traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: localai.dklair.io
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: local-ai-tls
      hosts:
        - localai.dklair.io

persistence:
  models:
    enabled: true
    storageClass: longhorn
    accessModes:
      - ReadWriteMany
    size: 20Gi
    globalMount: /models
  output:
    enabled: true
    storageClass: longhorn
    accessModes:
      - ReadWriteMany
    size: 10Gi
    globalMount: /tmp/generated

resources:
  requests:
    cpu: "2"
    memory: 8Gi
    nvidia.com/gpu: "1"
  limits:
    cpu: "4"
    memory: 8Gi
    nvidia.com/gpu: "1"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - eldragon