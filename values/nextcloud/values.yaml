# Nextcloud values for the shared cluster deployment.
# Uses the existing PostgreSQL instance in the cluster and keeps secrets out of git.

nextcloud:
  host: nextcloud.dklair.io
  username: admin
  existingSecret:
    enabled: true
    secretName: nextcloud-admin
    usernameKey: username
    passwordKey: password

  trustedDomains:
    - nextcloud.dklair.io

  # Explicit reverse-proxy trust configuration to satisfy Nextcloud's
  # forwarded-for header security checks behind Traefik.
  extraEnv:
    - name: TRUSTED_PROXIES
      value: "10.42.0.0/16 10.43.0.0/16"
    - name: FORWARDED_FOR_HEADERS
      value: "HTTP_X_FORWARDED_FOR HTTP_CF_CONNECTING_IP"

  # Admin hardening defaults.
  configs:
    z-admin-defaults.config.php: |-
      <?php
      $CONFIG = array (
        'trusted_domains' =>
        array (
          0 => 'localhost',
          1 => 'nextcloud.dklair.io',
        ),
        'maintenance_window_start' => 3,
        'default_phone_region' => 'US',
        'server_id' => 'nextcloud-k3s-01',
      );

internalDatabase:
  enabled: false

mariadb:
  enabled: false

postgresql:
  enabled: false

externalDatabase:
  enabled: true
  type: postgresql
  host: postgresql-rw.postgresql.svc.cluster.local:5432
  database: nextcloud
  existingSecret:
    enabled: true
    secretName: nextcloud-db
    usernameKey: username
    passwordKey: password

ingress:
  enabled: true
  className: my-traefik
  path: /
  pathType: Prefix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: nextcloud-nextcloud-security-headers@kubernetescrd
  tls:
    - secretName: nextcloud-tls
      hosts:
        - nextcloud.dklair.io

# HTTPS ingress termination is handled by Traefik, so Nextcloud should
# generate https URLs and callbacks.
phpClientHttpsFix:
  enabled: true
  protocol: https

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
  replica:
    replicaCount: 0
    persistence:
      enabled: false

persistence:
  enabled: true
  storageClass: longhorn
  size: 20Gi

cronjob:
  enabled: true
  type: sidecar