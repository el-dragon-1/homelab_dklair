# Open WebUI values
# - Uses existing PostgreSQL cluster (same instance, no new DB service)
# - Disables websocket support to avoid Redis dependency failures on single replica
# - Exposes service at ai.dklair.io through Traefik
# - Runs local Ollama inference pinned to eldragon GPU node

replicaCount: 1

ollama:
  enabled: true
  replicaCount: 1
  runtimeClassName: nvidia
  image:
    repository: ollama/ollama
    tag: "0.30.8"
  extraEnv:
    - name: NVIDIA_VISIBLE_DEVICES
      value: all
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: compute,utility
    # Best-effort GPU throttling knob; effective when CUDA MPS is active.
    - name: CUDA_MPS_ACTIVE_THREAD_PERCENTAGE
      value: "95"
    # Reduce concurrent generation pressure to keep sustained thermals lower.
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
  nodeSelector:
    kubernetes.io/hostname: eldragon
    kubernetes.io/arch: amd64
  ollama:
    gpu:
      enabled: true
      type: nvidia
      number: 1
  persistentVolume:
    enabled: true
    storageClass: longhorn
    size: 40Gi
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      # Enforced CPU cap for Ollama container.
      cpu: 950m
      memory: 8Gi

# Open WebUI application image (separate from Ollama)
image:
  repository: ghcr.io/open-webui/open-webui
  tag: "v0.9.6"
  pullPolicy: IfNotPresent

pipelines:
  enabled: false

tika:
  enabled: false

websocket:
  enabled: false
  manager: memory
  redis:
    enabled: false  # single-replica Open WebUI uses in-memory websocket state; avoids Redis dependency failures

ingress:
  enabled: true
  class: my-traefik
  host: ai.dklair.io
  tls: true
  existingSecret: open-webui-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure

persistence:
  enabled: true
  storageClass: longhorn
  size: 10Gi
  accessModes:
    - ReadWriteOnce

# Use existing PostgreSQL instance with a dedicated Open WebUI database/user
# from ExternalSecret in open-webui namespace. This avoids storing a full
# DATABASE_URL in git.
extraEnvVars:
  - name: DATABASE_TYPE
    value: postgresql
  - name: DATABASE_HOST
    value: postgresql-rw.postgresql.svc.cluster.local
  - name: DATABASE_PORT
    value: "5432"
  - name: DATABASE_NAME
    value: openwebui
  - name: DATABASE_USER
    valueFrom:
      secretKeyRef:
        name: open-webui-db
        key: username
  - name: DATABASE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: open-webui-db
        key: password
  - name: ENABLE_WEB_SEARCH
    value: "True"
  - name: WEB_SEARCH_ENGINE
    value: tavily
  - name: TAVILY_API_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-search
        key: tavily_api_key
  - name: WEB_SEARCH_RESULT_COUNT
    value: "3"
  # Keep search requests sequential to reduce provider/API bursts.
  - name: WEB_SEARCH_CONCURRENT_REQUESTS
    value: "1"
  # Required by current Open WebUI middleware path; disabling triggers generation errors.
  - name: ENABLE_SEARCH_QUERY_GENERATION
    value: "True"
  - name: BRAVE_SEARCH_API_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-search
        key: brave_search_api_key

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# Pin Open WebUI itself to eldragon as requested.
nodeSelector:
  kubernetes.io/hostname: eldragon
  kubernetes.io/arch: amd64
