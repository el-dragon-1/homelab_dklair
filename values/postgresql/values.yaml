# values/postgresql/values.yaml
cluster:                          # ← REQUIRED for chart v0.6.0
  name: postgresql
  instances: 1

  storage:
    size: 10Gi
    storageClass: longhorn

  bootstrap:                      # ← Nested under cluster:
    initdb:
      database: admin
      owner: admin
      secret:
        name: postgresql-admin
        key: password             # ← Correct field name
      encoding: UTF8
      localeCType: C
      localeCollate: C

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  postgresql:                     # ← Nested under cluster:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"