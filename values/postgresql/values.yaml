# values/postgresql/values.yaml

# Cluster identity
nameOverride: postgresql
fullNameOverride: postgresql-cluster

# Core settings (at ROOT level)
instances: 1

storage:
  size: 10Gi
  storageClass: longhorn

bootstrap:
  initdb:
    database: admin
    owner: admin
    secret:
      name: postgresql-admin   # ← Secret must have 'username' + 'password' keys
    encoding: UTF8
    localeCType: C
    localeCollate: C

postgresql:
  parameters:
    max_connections: "100"
    shared_buffers: "128MB"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi