# === CloudNativePG Cluster Chart v0.6.0 ===
# Most values are nested under 'cluster:' per chart schema [[1]]

# Chart-level overrides (optional)
nameOverride: postgresql
fullNameOverride: postgresql-cluster

# === Cluster configuration (under 'cluster:' key) ===
cluster:
  # Number of instances
  instances: 1

  # Storage configuration
  storage:
    size: 10Gi
    storageClass: longhorn

  # Bootstrap via initdb (THIS IS THE KEY FIX)
  initdb:   # ← NOT 'bootstrap.initdb'
    database: admin
    owner: admin
    secret:
      name: postgresql-admin   # ← Secret must have 'username' + 'password' keys
    encoding: UTF8
    localeCType: C
    localeCollate: C

  # PostgreSQL parameters
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi