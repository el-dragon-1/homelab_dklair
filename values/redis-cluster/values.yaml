# Redis Cluster Configuration
image:
  repository: redis
  tag: 7.2-alpine
  pullPolicy: IfNotPresent

cluster:
  name: redis-cluster
  namespace: redis
  size: 3
  announceHostname: false

# Storage configuration
storage:
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

# Redis configuration
redisConfig:
  additionalRedisConfig: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 999

# Password management via External Secrets
auth:
  enabled: true
  secretName: redis-auth
  secretKey: password

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: false

# Persistence
persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce