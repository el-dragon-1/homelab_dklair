# ============================================================
# Bitnami Redis Cluster Values - Homelab Configuration
# Chart: redis-cluster v13.0.4 (schema: persistence + redis.*, not primary/auth)
# ============================================================

cluster:
  nodes: 3
  replicas: 0

image:
  registry: docker.io
  repository: bitnamilegacy/redis-cluster
  tag: 7.2-debian-12
  pullPolicy: IfNotPresent
  debug: false

global:
  security:
    allowInsecureImages: true

usePassword: true
existingSecret: redis-auth
existingSecretPasswordKey: password
usePasswordFiles: true

persistence:
  enabled: true
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce
  size: 2Gi

redis:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector:
    kubernetes.io/hostname: eldragon
    kubernetes.io/arch: amd64
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  defaultConfigOverride: |-
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
    cluster-require-full-coverage no

networkPolicy:
  enabled: false

service:
  type: ClusterIP
  ports:
    redis: 6379

podSecurityContext:
  enabled: true
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001

volumePermissions:
  enabled: false
  image:
    registry: docker.io
    repository: bitnami/os-shell
    tag: 12-debian-12-r47
    pullPolicy: IfNotPresent

tls:
  enabled: false

serviceAccount:
  create: true
