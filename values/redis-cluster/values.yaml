# values/redis-cluster/values.yaml

# 1. Cluster Configuration (Image goes here!)
cluster:
  name: redis-cluster
  namespace: redis
  clusterSize: 3
  dockerImage: "redis:7.2-alpine"  # <-- THIS IS THE FIX
  announceHostname: false

# 2. Authentication
auth:
  enabled: true
  secretName: redis-auth
  secretKey: password

# 3. Storage & Persistence
storage:
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

# 4. Redis Config
redisConfig:
  additionalRedisConfig: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

# 5. Resources & Security
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 999