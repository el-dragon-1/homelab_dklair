# values/redis-cluster/values.yaml
image:
  repository: redis
  tag: 7.2-alpine
  pullPolicy: IfNotPresent

# Explicitly override the CR's kubernetesConfig block
kubernetesConfig:
  image: "redis:7.2-alpine"
  imagePullPolicy: "IfNotPresent"

cluster:
  name: redis-cluster
  dockerImage: "redis:7.2-alpine"
  namespace: redis
  clusterSize: 3  # Note: chart uses 'clusterSize', not 'size'
  
announceHostname: false

storage:
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

redisConfig:
  additionalRedisConfig: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 999

auth:
  enabled: true
  secretName: redis-auth
  secretKey: password

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce