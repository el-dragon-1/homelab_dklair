# ============================================================
# Bitnami Redis Cluster Values - Homelab Configuration
# ============================================================

# Architecture: cluster mode (no separate replicas)
architecture: cluster

# Cluster topology: 3 masters, 0 replicas per master
cluster:
  nodes: 3          # Number of master nodes
  replicas: 0       # No slave replicas (saves resources)

# Image configuration
image:
  registry: docker.io
  repository: bitnami/redis-cluster
  tag: 7.2.13-debian-12-r0  # Redis 7.2 + Bitnami hardening
  pullPolicy: IfNotPresent
  debug: false

# Authentication: Use existing Kubernetes Secret from ExternalSecrets
auth:
  enabled: true
  existingSecret: redis-auth        # Secret created by redis-auth-externalsecret.yaml
  existingSecretPasswordKey: password
  usePasswordFiles: true            # Mount as file for better security

# Persistence: Longhorn storage
primary:
  persistence:
    enabled: true
    storageClass: longhorn
    accessModes:
      - ReadWriteOnce
    size: 2Gi
    # Optional: Add volume claim template annotations if needed
    # annotations: {}

# Resources per pod (applies to all cluster nodes)
primary:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Node affinity: Force scheduling onto 'eldragon' (amd64)
primary:
  nodeSelector:
    kubernetes.io/hostname: eldragon
    kubernetes.io/arch: amd64
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

# Redis configuration overrides
commonConfiguration: |-
  # Memory management
  maxmemory 256mb
  maxmemory-policy allkeys-lru
  # Persistence
  appendonly yes
  appendfsync everysec
  # Cluster settings (Bitnami handles these automatically)
  cluster-require-full-coverage no

# Network policy (disable for homelab simplicity)
networkPolicy:
  enabled: false

# Metrics (optional: enable later for Prometheus)
metrics:
  enabled: false
  # serviceMonitor:
  #   enabled: false

# Service configuration
service:
  type: ClusterIP
  ports:
    redis: 6379
    redisBus: 16379

# Pod security context (Bitnami defaults are good, but explicit is better)
podSecurityContext:
  enabled: true
  fsGroup: 1001
  sysctls: []

containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

# Startup/Liveness/Readiness probes (Bitnami defaults are solid)
# Override only if you see probe failures:
# primary:
#   startupProbe:
#     enabled: true
#     initialDelaySeconds: 10
#     periodSeconds: 10
#     timeoutSeconds: 5
#     successThreshold: 1
#     failureThreshold: 30  # Allow longer startup for cluster formation

# Extra environment variables (if needed)
# extraEnvVars: []
# extraEnvVarsCM: ""
# extraEnvVarsSecret: ""

# Volume permissions init container (helps with Longhorn)
volumePermissions:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/os-shell
    tag: 12-debian-12-r28
    pullPolicy: IfNotPresent
  resources:
    limits: {}
    requests: {}

# TLS/SSL: Disabled for now (enable later with cert-manager)
tls:
  enabled: false

# Service account
serviceAccount:
  create: true
  name: ""  # Auto-generate
  annotations: {}