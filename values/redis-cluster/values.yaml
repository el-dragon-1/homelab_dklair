redisImage:
  repository: redis
  tag: "7.2-alpine"
  pullPolicy: Always
cluster:
  name: redis-cluster
  namespace: redis
  size: 3 
  announceHostname: false
auth:
  enabled: true
  secretName: redis-auth
  secretKey: password
persistence:
  enabled: true
  storageClass: longhorn
  size: 2Gi
  accessMode: ReadWriteOnce
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
securityContext:
  runAsNonRoot: true
  runAsUser: 999
nodeSelector:
  kubernetes.io/hostname: eldragon
  kubernetes.io/arch: amd64
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
redisConfig:
  additionalRedisConfig: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
