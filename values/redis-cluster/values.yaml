# ============================================================
# Bitnami Redis Cluster Values - Homelab Configuration
# Chart: redis-cluster v13.0.4
# ============================================================

cluster:
  nodes: 6
  replicas: 1

image:
  registry: docker.io
  repository: bitnamilegacy/redis-cluster
  tag: 7.2-debian-12
  pullPolicy: IfNotPresent
  debug: false

global:
  security:
    allowInsecureImages: true

usePassword: true
existingSecret: redis-auth
existingSecretPasswordKey: password
usePasswordFiles: true

persistence:
  enabled: true
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce
  size: 8Gi

networkPolicy:
  enabled: false

service:
  type: ClusterIP
  ports:
    redis: 6379

podSecurityContext:
  enabled: true
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001

redis:
  useAOFPersistence: "yes"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector:
    kubernetes.io/hostname: eldragon
    kubernetes.io/arch: amd64
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

volumePermissions:
  enabled: false

tls:
  enabled: false

serviceAccount:
  create: true
