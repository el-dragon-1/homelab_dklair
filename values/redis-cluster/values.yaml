# values/redis-cluster/values.yaml
kubernetesConfig:
  image: "redis:7.2-alpine"
  imagePullPolicy: IfNotPresent

cluster:
  name: redis-cluster
  namespace: redis
  clusterSize: 3
  announceHostname: false

auth:
  enabled: true
  secretName: redis-auth
  secretKey: password

redisConfig:
  additionalRedisConfig: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 999

storage:
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce