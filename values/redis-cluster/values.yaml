# Cluster config - THIS IS WHERE THE IMAGE MUST GO
cluster:
  name: redis-cluster
  namespace: redis
  clusterSize: 3
  dockerImage: "redis:7.2-alpine"
  announceHostname: false

# Authentication
auth:
  enabled: true
  secretName: redis-auth
  secretKey: password

# Storage
storage:
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

# Redis config
redisConfig:
  additionalRedisConfig: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

# Resources & Security
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 999