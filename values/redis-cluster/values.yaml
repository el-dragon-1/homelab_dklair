# values/redis-cluster/values.yaml
cluster:
  name: redis-cluster
  namespace: redis
  clusterSize: 3

  # --------------------------------------------------------------------
  # Image – the chart really reads `image.repository` / `image.tag`,
  # not `dockerImage`.  Use a Redis >= 7.0 to get the new directive.
  # --------------------------------------------------------------------
  image:
    repository: redis
    tag: "7.2-alpine"

  # If you *do not* want the new directive (e.g. you are happy with
  # the default discovery using the pod's IP), set it to an empty string.
  announceHostname: ""   # <-- disables `cluster-announce-hostname` line

auth:
  enabled: true
  secretName: redis-auth
  secretKey: password

storage:
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

persistence:
  enabled: true
  storageClass: "longhorn"
  size: 2Gi
  accessMode: ReadWriteOnce

redisConfig:
  additionalRedisConfig: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 999
