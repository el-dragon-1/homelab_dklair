# ============================================================
# Bitnami Redis Cluster Values - Homelab Configuration
# Chart: redis-cluster v13.0.4
# ============================================================

# Architecture: cluster mode
architecture: cluster

# Cluster topology: 3 masters, 0 replicas
cluster:
  nodes: 3
  replicas: 0

# Image configuration
image:
  registry: docker.io
  repository: bitnamilegacy/redis-cluster
  tag: 7.2-debian-12
  pullPolicy: IfNotPresent
  debug: false

global:
  security:
    allowInsecureImages: true

# Authentication: Use existing Kubernetes Secret
auth:
  enabled: true
  existingSecret: redis-auth
  existingSecretPasswordKey: password
  usePasswordFiles: true

# Persistence: Longhorn storage
primary:
  persistence:
    enabled: true
    storageClass: longhorn
    accessModes:
      - ReadWriteOnce
    size: 2Gi

# Resources per pod
primary:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Node affinity: Force scheduling onto 'eldragon'
primary:
  nodeSelector:
    kubernetes.io/hostname: eldragon
    kubernetes.io/arch: amd64
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

# Redis configuration overrides
commonConfiguration: |-
  maxmemory 256mb
  maxmemory-policy allkeys-lru
  appendonly yes
  appendfsync everysec
  cluster-require-full-coverage no

# Network policy (disable for homelab)
networkPolicy:
  enabled: false

# Service configuration
service:
  type: ClusterIP
  ports:
    redis: 6379
    redisBus: 16379

# Security contexts
podSecurityContext:
  enabled: true
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

# Volume permissions init container (helps with Longhorn)
volumePermissions:
  enabled: false
  image:
    registry: docker.io
    repository: bitnami/os-shell
    tag: 12-debian-12-r47
    pullPolicy: IfNotPresent

# TLS: Disabled for now
tls:
  enabled: false

# Service account
serviceAccount:
  create: true