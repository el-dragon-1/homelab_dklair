# values/redis-operator/values.yaml
replicaCount: 1

image:
  repository: otcontainerkit/redis-operator
  tag: v1.2.0
  pullPolicy: IfNotPresent

# === CRITICAL FIX: Schedule on x86_64 node-5 ===
nodeSelector:
  kubernetes.io/arch: amd64      # ← Force x86_64 architecture
  kubernetes.io/hostname: node-5 # ← Or explicitly target your server

# Relax security context for K3s testing
securityContext:
  runAsNonRoot: false
  runAsUser: 0
podSecurityContext:
  runAsNonRoot: false

# Allow scheduling on control-plane if needed
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# Keep other settings as-is...
redisOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  installCRDs: true

redisExporter:
  enabled: false  # Disable to reduce resource usage

storage:
  storageClass: "longhorn"
  size: 1Gi

service:
  type: ClusterIP

ingress:
  enabled: false

rbac:
  create: true

serviceAccount:
  create: true
  name: redis-operator