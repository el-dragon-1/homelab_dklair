replicaCount: 1

service:
  type: ClusterIP
  port: 8080

# Pin runtime secret value so Helm rendering is deterministic under Argo CD.
secret:
  create: true
  value: "searxng-runtime-secret-change-me-if-rotating"

ingress:
  enabled: false

# Keep this internal-only for Open WebUI web search.
config:
  useDefaultSettings: true
  settings:
    engines:
      # DuckDuckGo is currently CAPTCHA-blocked from this egress IP and often returns zero results.
      - name: duckduckgo
        disabled: true
      # Keep non-web/specialized engines disabled for Open WebUI query flow.
      - name: wikipedia
        disabled: true
      - name: brave
        disabled: true
    search:
      formats:
        - html
        - json
    server:
      base_url: http://searxng.searxng.svc.cluster.local:8080/
      limiter: false
      public_instance: false
      method: GET

# In-cluster deployment does not require persistent cache for this use case.
persistence:
  cache:
    enabled: false

# Open WebUI search volume is low; disable built-in Valkey to reduce moving parts.
valkey:
  enabled: false
