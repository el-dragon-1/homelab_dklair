apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgadmin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"  # After postgresql deploys
spec:
  project: default
  source:
    repoURL: https://github.com/el-dragon-1/homelab_dklair.git
    targetRevision: HEAD
    path: apps/pgadmin
  destination:
    server: https://kubernetes.default.svc
    namespace: pgadmin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true